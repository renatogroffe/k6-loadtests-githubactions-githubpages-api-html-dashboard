name: load-tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  loadTestsScript: 'load-test.js'
  htmlReporterK6: 'k6-reporter.html'
  testsDirectory: './tests'
  K6_WEB_DASHBOARD: 'true'
  K6_WEB_DASHBOARD_EXPORT: 'k6-web-dashboard.html'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Atualizar script de testes com após replaces
        uses: cschleiden/replace-tokens@v1
        with:
          files: '${{ env.testsDirectory }}/${{ env.loadTestsScript }}'
        env:
          EndpointGetTest: ${{ vars.ENDPOINT_CONTAGEM }}

      - name: Exibir conteúdo do script de testes
        run: cat ${{ env.testsDirectory }}/${{ env.loadTestsScript }}

      - name: Instalar o k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
          k6

      - name: Executar os testes de carga com k6
        run: |
          cd ${{ env.testsDirectory }}
          k6 run ${{ env.loadTestsScript }} --vus ${{ env.ConcurrentUsers }} --iterations ${{ env.Iterations }}
        env:
          ConcurrentUsers: ${{ vars.VUS }}
          Iterations: ${{ vars.EXECUTIONS }}

      - name: Listar arquivos e diretórios na pasta ./Tests
        if: always()
        run: |
          echo '** Arquivos/diretórios após a execução dos testes --> ${{ env.testsDirectory }}'
          cd ${{ env.testsDirectory }}
          ls

      - name: Upload Web Dashboard
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-web-dashboard
          path: ${{ env.testsDirectory }}/${{ env.K6_WEB_DASHBOARD_EXPORT }}

      - name: Upload k6 Reporter
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-reporter
          path: ${{ env.testsDirectory }}/${{ env.htmlReporterK6 }}

      - name: Prepare GitHub Pages content
        if: always()
        run: |
          mkdir -p site
          cp ${{ env.testsDirectory }}/${{ env.K6_WEB_DASHBOARD_EXPORT }} site/
          cp ${{ env.testsDirectory }}/${{ env.htmlReporterK6 }} site/

          # Criar uma landing page
          cat <<EOF > site/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <title>K6 Load Test Reports</title>
          </head>
          <body>
              <h1>🚀 K6 Load Test Reports</h1>
              <ul>
                  <li><a href="k6-web-dashboard.html">Web Dashboard</a></li>
                  <li><a href="k6-reporter.html">K6 Reporter</a></li>
              </ul>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Add link to Step Summary
        if: always()
        run: |
          echo "## 🚀 Load Test Reports" >> $GITHUB_STEP_SUMMARY
          echo "Reports will be available in GitHub Pages after deployment." >> $GITHUB_STEP_SUMMARY          

  deploy:
    if: always() && github.ref == 'refs/heads/main'
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4        

  build-simulation:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Simular um build
        run: echo "Simulando um build..."
